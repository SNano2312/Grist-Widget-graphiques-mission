<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8">
<style>
body{font-family:monospace;font-size:13px;padding:20px;background:#f5f5f5}
h2{font-family:sans-serif;margin-bottom:12px}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:14px}
table{border-collapse:collapse;width:100%}
th{background:#eee;padding:6px 10px;text-align:left;border:1px solid #ccc;font-size:11px}
td{padding:5px 10px;border:1px solid #ddd;font-size:12px;white-space:nowrap}
.num{color:#1B4FBF;font-weight:600}
.txt{color:#555}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px}
.bn{background:#EEF2FB;color:#1B4FBF}
.bt{background:#F0EEE9;color:#555}
pre{background:#1e1e1e;color:#d4d4d4;padding:14px;border-radius:6px;overflow:auto;font-size:11px;max-height:300px}
</style></head>
<body>
<h2>🔍 Diagnostic Widget Grist</h2>

<div class="card">
  <b>Statut connexion Grist</b><br>
  <span id="gristStatus">En attente…</span>
</div>

<div class="card">
  <b>Colonnes reçues de Grist</b> — <span id="colCount"></span><br><br>
  <table id="colTable">
    <thead><tr><th>#</th><th>Nom exact (H[])</th><th>Nom lowercase</th><th>Type JS de la 1ère valeur</th><th>1ère valeur</th><th>2ème valeur</th><th>isNum()?</th></tr></thead>
    <tbody id="colBody"></tbody>
  </table>
</div>

<div class="card">
  <b>Données brutes — 3 premières lignes (JSON)</b><br><br>
  <pre id="rawJson">…</pre>
</div>

<div class="card">
  <b>Test isNum() avec les noms exacts de vos colonnes</b><br>
  <div id="numTest"></div>
</div>

<script>
const MONTANT_COLS=['montant avance','total ij non dégrévés','frais prev saisies','total train','total avion','total location','total hébergement','total hebergement'];
const NON_MONTANT=['no om','matricule','trajets train','trajets avion','locations voiture','nombre de nuit','no cde sifac','no rc sifac'];

let H=[], R=[];

function isNum(idx){
  const h=(H[idx]||'').toLowerCase().trim();
  if(NON_MONTANT.some(n=>h===n||h.includes(n)))return false;
  if(MONTANT_COLS.some(n=>h===n||h.includes(n)))return true;
  return false;
}

function initGrist(){
  if(typeof grist==='undefined'){
    document.getElementById('gristStatus').innerHTML='<span style="color:orange">⚠ SDK Grist non trouvé — mode hors Grist</span>';
    return;
  }
  document.getElementById('gristStatus').innerHTML='<span style="color:green">✓ SDK Grist chargé</span>';
  grist.ready({requiredAccess:'read table'});
  grist.onRecords(records=>{
    if(!records||!records.length){
      document.getElementById('gristStatus').innerHTML='<span style="color:red">✗ Aucun enregistrement reçu</span>';
      return;
    }
    document.getElementById('gristStatus').innerHTML=`<span style="color:green">✓ ${records.length} enregistrements reçus</span>`;
    H=Object.keys(records[0]).filter(k=>k!=='id'&&!k.startsWith('_'));
    R=records.map(r=>H.map(h=>r[h]!==undefined&&r[h]!==null?r[h]:''));
    renderDiag(records);
  });
}

function renderDiag(records){
  document.getElementById('colCount').textContent=H.length+' colonnes';

  // Table colonnes
  let rows='';
  H.forEach((h,i)=>{
    const v0=R.length>0?R[0][i]:'';
    const v1=R.length>1?R[1][i]:'';
    const t=typeof v0;
    const num=isNum(i);
    rows+=`<tr>
      <td>${i}</td>
      <td><b>${h}</b></td>
      <td style="color:#999">${h.toLowerCase().trim()}</td>
      <td><span class="badge ${t==='number'?'bn':'bt'}">${t}</span></td>
      <td>${JSON.stringify(v0)}</td>
      <td>${JSON.stringify(v1)}</td>
      <td><span class="badge ${num?'bn':'bt'}">${num?'✓ OUI':'✗ non'}</span></td>
    </tr>`;
  });
  document.getElementById('colBody').innerHTML=rows;

  // JSON brut
  document.getElementById('rawJson').textContent=JSON.stringify(records.slice(0,3),null,2);

  // Test isNum
  let html='<table><thead><tr><th>Nom colonne</th><th>toLowerCase()</th><th>Match MONTANT_COLS?</th><th>Match NON_MONTANT?</th><th>Résultat isNum</th></tr></thead><tbody>';
  H.forEach((h,i)=>{
    const lc=h.toLowerCase().trim();
    const mMontant=MONTANT_COLS.find(n=>lc===n||lc.includes(n));
    const mNon=NON_MONTANT.find(n=>lc===n||lc.includes(n));
    const num=isNum(i);
    html+=`<tr>
      <td>${h}</td>
      <td style="color:#999">${lc}</td>
      <td>${mMontant?`<span class="badge bn">✓ "${mMontant}"</span>`:'—'}</td>
      <td>${mNon?`<span class="badge bt">✓ "${mNon}"</span>`:'—'}</td>
      <td><span class="badge ${num?'bn':'bt'}">${num?'MONTANT':'texte'}</span></td>
    </tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('numTest').innerHTML=html;
}

const sdk=document.createElement('script');
sdk.src='https://docs.getgrist.com/grist-plugin-api.js';
sdk.onload=()=>initGrist();
sdk.onerror=()=>{document.getElementById('gristStatus').innerHTML='<span style="color:red">✗ SDK Grist non chargeable</span>';};
document.head.appendChild(sdk);
</script>
</body></html>
